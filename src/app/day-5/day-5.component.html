<div class="form-conatainer">
  <form [formGroup]="dynamicForm">
    <div formGroupName="personalInfo">
      <label for="name">Name:</label>
      <input id="name" formControlName="name" />
      <label for="email">Email:</label>
      <input id="email" formControlName="email" />
    </div>
    <div formArrayName="addresses">
      <div
        *ngFor="let address of addresses.controls; let i = index"
        [formGroupName]="i"
      >
        <h4>Address {{ i + 1 }}</h4>
        <label for="street-{{ i }}">Street:</label>
        <input id="street-{{ i }}" formControlName="street" />

        <label for="city-{{ i }}">City:</label>
        <input id="city-{{ i }}" formControlName="city" />

        <label for="zip-{{ i }}">Zip Code:</label>
        <input id="zip-{{ i }}" formControlName="zip" />

        <button type="button" (click)="removeAddress(i)">Remove Address</button>
      </div>
    </div>
    <button type="button" (click)="addAddress()">Add Address</button>
    <button type="submit">Submit</button>
  </form>
</div>
